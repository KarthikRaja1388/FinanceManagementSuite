{% extends 'fms/base.html' %}

{% block title %}FMS - Category{% endblock %}

{% block content%}
<div class="container-fluid py-3">

    <!-- Page Header & Search -->
    <div class="row mb-4 align-items-center">
        <div class="col-12 align-items-center">
            <h3 class="fw-bold text-dark mb-3 mb-md-0 text-center">Categories</h3>
        </div>
    </div>
</div>

<!-- Add New Category Button -->
<div class="row mb-4">
    <div class="col-12 d-flex justify-content-end">
        <button class="btn btn-primary py-2 shadow-sm  d-flex align-items-center justify-content-center"
            data-bs-toggle="modal" data-bs-target="#addCategoryModal">
            <i class="fa-solid fa-plus me-2"></i> New Category
        </button>
    </div>
</div>

<!-- Category List -->
<div class="row g-3">
    <!-- Example Category: Groceries -->
    <div class="col-12 col-md-10 col-lg-8 mx-auto">
        <div class="card category-card border-0 shadow-sm">
            <div class="card-body d-flex align-items-center">
                <div class="category-icon me-3 bg-danger-soft text-danger">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div class="flex-grow-1">
                    <h6 class="mb-0 fw-bold">Groceries</h6>
                    <small class="text-muted">Supermarket spending</small>
                </div>
                <div class="action-buttons d-flex gap-2">
                    <button class="btn btn-icon btn-outline-primary"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-icon btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<!-- Simple Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="add_category_form" action="{% url 'add_category' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="category_name">Category Name</label>
                        <input type="text" class="form-control" id="category_name" name="category_name">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Category</button>

                </form>
            </div>
            <div class="modal-footer">
            </div>
        </div>
    </div>
</div>
{% endblock %}
