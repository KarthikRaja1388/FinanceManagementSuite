{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'fms/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'fms/css/index.css' %}">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/845ae26aa3.js" crossorigin="anonymous"></script>

    <title>FMS - Signup</title>
</head>

<body>

    <!-- HEADER / NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg">

            <div class="d-flex align-items-center w-100">
                <!-- Mobile Sidebar Toggle -->
                <button class="btn d-lg-none me-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#sidebarMenu">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <!-- Brand -->
                <a class="navbar-brand" href="{% url 'login_page' %}">
                    <img src="{% static 'fms/images/fms_logo.png' %}" id="brand-logo" alt="">
                </a>

            </div>
        </nav>
    </header>
    <main class="container-fluid">

        <div class="form-container col-4">
                    <!-- Alerts -->
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
                {{ message|linebreaksbr }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <!-- Page Content -->
            {% block content %}
            {% endblock %}
            <form action="{% url 'signup_user' %}" method="POST" class="form">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="firstname" class="form-label">Firstname</label>
                    <input type="text" class="form-control" id="firstname" name="firstname" value="{{form_data.first_name}}">
                </div>
                <div class="mb-3">
                    <label for="lastname" class="form-label">Lastname</label>
                    <input type="text" class="form-control" id="lastname" name="lastname" value="{{form_data.last_name}}">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{form_data.email}}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password">
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Re-type Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password">
                </div>
                <div class="mb-3 text-center">
                    <button type="submit" class="btn btn-primary col-12">Sign up</button>
                </div>
            </form>

        </div>
    </main>


</body>

</html>
