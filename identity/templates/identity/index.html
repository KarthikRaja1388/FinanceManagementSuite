{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'fms/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'fms/css/index.css' %}">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/845ae26aa3.js" crossorigin="anonymous"></script>

    <title></title>
</head>

<body>

    <!-- HEADER / NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg">

            <div class="d-flex align-items-center w-100">
                <!-- Mobile Sidebar Toggle -->
                <button class="btn d-lg-none me-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#sidebarMenu">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <!-- Brand -->
                <a class="navbar-brand" href="#">
                    <img src="{% static 'fms/images/fms_logo.png' %}" id="brand-logo" alt="">
                </a>

            </div>
        </nav>
    </header>
    <main class="container-fluid">
        <!-- Alerts -->
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
                {{ message|linebreaksbr }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <!-- Page Content -->
            {% block content %}
            {% endblock %}
        <div class="form-container col-4">
            <form action="{% url 'authenticate_user' %}" method="POST" class="form">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password">
                </div>
                <div class="mb-3 text-center">
                    <button type="submit" class="btn btn-primary col-12">Login</button>
                </div>
            </form>
            <div class="identity-utils mt-3 text-center">
                <a href="" class="me-3" data-bs-toggle="modal" data-bs-target="#reset-pwd-modal">Forgot
                    password?</a><br>
                <a href="{% url 'signup_user' %}">Don't have an account yet?</a>
            </div>
        </div>
    </main>
    <!--reset password modal-->
    <div class="modal reset-pwd-modal" id="reset-pwd-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Modal body text goes here.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
